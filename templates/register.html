<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Free Fire Tools</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f59e0b;
            --accent: #22c55e;
            --dark: #09090b;
            --dark-card: #0c0c10;
            --dark-border: #1a1a2e;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .dot-pattern {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: radial-gradient(circle, #27272a 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.5;
        }

        .meteors-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .meteor {
            position: absolute;
            top: -50%;
            left: 50%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
            animation: meteor-fall linear infinite;
            opacity: 0;
            border-radius: 100px;
        }

        @keyframes meteor-fall {
            0% { transform: rotate(215deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            70% { opacity: 1; }
            100% { transform: rotate(215deg) translateX(-800px); opacity: 0; }
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 20px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(99,102,241,0.5), transparent 50%, rgba(168,85,247,0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-flow 5s ease infinite;
        }

        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .password-group {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0;
        }

        .password-toggle:hover {
            color: var(--text);
        }

        .btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 0 30px rgba(99,102,241,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99,102,241,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--dark-border);
        }

        .auth-footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: var(--primary-dark);
        }

        .result-box {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            display: none;
        }

        .result-box.active { display: block; }

        .result-box.success {
            border-color: rgba(34, 197, 94, 0.3);
            background: rgba(34, 197, 94, 0.05);
        }

        .result-box.error {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.05);
        }

        .result-box h4 {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .result-box.success h4 { color: #22c55e; }
        .result-box.error h4 { color: #ef4444; }

        .result-content {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .loading {
            display: none;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        .loading.active { display: flex; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--dark-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .auth-container { padding: 0; }
            .auth-card { padding: 2rem; }
        }
    </style>
</head>
<body>
    <div class="dot-pattern"></div>
    <div class="meteors-container" id="meteors"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Đăng ký</h1>
                <p>Tạo tài khoản mới để sử dụng Free Fire Tools</p>
            </div>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required minlength="3" maxlength="20">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập email" required>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="password-group">
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Xác nhận mật khẩu</label>
                    <div class="password-group">
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="register-btn">
                    <i class="fas fa-user-plus"></i> Đăng ký
                </button>

                <div class="loading" id="register-loading">
                    <div class="spinner"></div>
                    <span>Đang đăng ký...</span>
                </div>

                <div class="result-box" id="register-result"></div>
            </form>

            <div class="auth-footer">
                <p>Đã có tài khoản? <a href="/auth">Đăng nhập ngay</a></p>
            </div>
        </div>
    </div>

    <script>
        // Create meteors
        const meteorsContainer = document.getElementById('meteors');
        for (let i = 0; i < 10; i++) {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.style.left = `${Math.random() * 100}%`;
            meteor.style.animationDuration = `${Math.random() * 3 + 2}s`;
            meteor.style.animationDelay = `${Math.random() * 5}s`;
            meteorsContainer.appendChild(meteor);
        }

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                showResult('error', 'Mật khẩu xác nhận không khớp');
                return;
            }
            
            const registerBtn = document.getElementById('register-btn');
            const loading = document.getElementById('register-loading');
            const resultBox = document.getElementById('register-result');
            
            registerBtn.disabled = true;
            loading.classList.add('active');
            resultBox.classList.remove('active');
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showResult('success', 'Đăng ký thành công! Đang chuyển hướng...');
                    setTimeout(() => {
                        window.location.href = '/auth';
                    }, 1500);
                } else {
                    showResult('error', result.error || 'Đăng ký thất bại');
                }
            } catch (error) {
                showResult('error', error.message || 'Có lỗi xảy ra');
            }
            
            registerBtn.disabled = false;
            loading.classList.remove('active');
        }

        function showResult(type, message) {
            const resultBox = document.getElementById('register-result');
            resultBox.className = `result-box active ${type}`;
            resultBox.innerHTML = `<h4>${type === 'success' ? 'Thành công' : 'Lỗi'}</h4><div class="result-content">${message}</div>`;
        }
    </script>
</body>
</html>
