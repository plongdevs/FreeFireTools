<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Free Fire Tools</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f59e0b;
            --accent: #22c55e;
            --dark: #09090b;
            --dark-card: #0c0c10;
            --dark-border: #1a1a2e;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dot-pattern {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: radial-gradient(circle, #27272a 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.5;
        }

        .meteors-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .meteor {
            position: absolute;
            top: -50%;
            left: 50%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
            animation: meteor-fall linear infinite;
            opacity: 0;
            border-radius: 100px;
        }

        @keyframes meteor-fall {
            0% { transform: rotate(215deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            70% { opacity: 1; }
            100% { transform: rotate(215deg) translateX(-800px); opacity: 0; }
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .auth-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 20px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(99,102,241,0.5), transparent 50%, rgba(168,85,247,0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-flow 5s ease infinite;
        }

        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .remember-me label {
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 0 30px rgba(99,102,241,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99,102,241,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--dark-border);
        }

        .auth-footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: var(--primary-dark);
        }

        .result-box {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            display: none;
        }

        .result-box.active { display: block; }

        .result-box.success {
            border-color: rgba(34, 197, 94, 0.3);
            background: rgba(34, 197, 94, 0.05);
        }

        .result-box.error {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.05);
        }

        .result-box h4 {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .result-box.success h4 { color: #22c55e; }
        .result-box.error h4 { color: #ef4444; }

        .result-content {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .loading {
            display: none;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        .loading.active { display: flex; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--dark-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .auth-container { padding: 1rem; }
            .auth-card { padding: 2rem; }
        }
    </style>
</head>
<body>
    <div class="dot-pattern"></div>
    <div class="meteors-container" id="meteors"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Đăng nhập</h1>
                <p>Chào mừng trở lại với Free Fire Tools</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)" action="javascript:void(0)">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember-me" name="remember-me">
                    <label for="remember-me">Ghi nhớ đăng nhập</label>
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </button>

                <div class="loading" id="login-loading">
                    <div class="spinner"></div>
                    <span>Đang đăng nhập...</span>
                </div>

                <div class="result-box" id="login-result"></div>
            </form>

            <div class="auth-footer">
                <p>Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>

    <script>
        // Create meteors
        const meteorsContainer = document.getElementById('meteors');
        for (let i = 0; i < 10; i++) {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.style.left = `${Math.random() * 100}%`;
            meteor.style.animationDuration = `${Math.random() * 3 + 2}s`;
            meteor.style.animationDelay = `${Math.random() * 5}s`;
            meteorsContainer.appendChild(meteor);
        }

        async function handleLogin(event) {
            event.preventDefault();
            console.log('Login form submitted');
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;
            
            const loginBtn = document.getElementById('login-btn');
            const loading = document.getElementById('login-loading');
            const resultBox = document.getElementById('login-result');
            
            loginBtn.disabled = true;
            loading.classList.add('active');
            resultBox.classList.remove('active');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember_me: rememberMe })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showResult('success', 'Đăng nhập thành công! Đang chuyển hướng...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showResult('error', result.error || 'Đăng nhập thất bại');
                }
            } catch (error) {
                showResult('error', error.message || 'Có lỗi xảy ra');
            }
            
            loginBtn.disabled = false;
            loading.classList.remove('active');
        }

        function showResult(type, message) {
            const resultBox = document.getElementById('login-result');
            resultBox.className = `result-box active ${type}`;
            resultBox.innerHTML = `<h4>${type === 'success' ? 'Thành công' : 'Lỗi'}</h4><div class="result-content">${message}</div>`;
        }
    </script>
</body>
</html>
